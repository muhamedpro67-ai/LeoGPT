    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --davinci-green: #689F38; 
            --davinci-white: #FFFFFF;
            --text-dark: #333333;
            --bg-light: #F4F7F6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--davinci-white);
        }

        header {
            background-color: var(--davinci-white);
            padding: 30px 0;
            text-align: center;
            border-bottom: 4px solid var(--davinci-green);
        }

        /* Makes the logo look big and professional */
        .logo {
            width: 180px; 
            height: auto;
            margin-bottom: 10px;
        }

        h1 {
            color: var(--davinci-green);
            font-size: 3rem;
            margin: 0;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .bot-showcase {
            background-color: var(--davinci-green);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }

        /* This fixes the "small" issue - it forces the bot to be wide */
        .bot-container {
            width: 100%;
            min-height: 700px; 
            background-color: white;
            border-radius: 15px;
            margin-top: 20px;
            overflow: hidden;
        }

        /* Styling for the info boxes */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .info-box {
            background: var(--bg-light);
            padding: 20px;
            border-radius: 15px;
            border-left: 6px solid var(--davinci-green);
        }

        .phone-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--davinci-green);
            text-decoration: none;
        }
    </style>
</head>
